version: "3.8"

services:
  # ─── Backend (FastAPI + Quantum Engine) ───────────────────────
  backend:
    build: ./backend
    container_name: aliasingviz-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8000
      - QUANTUM_PROVIDER=local_classical
      - QUANTUM_SHOTS=1024
      - QUANTUM_NOISE_MODEL=ideal
      - QUANTUM_NUM_QUBITS=4
      - QUANTUM_CIRCUIT_TYPE=phase_estimation
      - DB_PATH=/app/data/experiments.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + Three.js) ────────────────────────────
  frontend:
    build: ./frontend
    container_name: aliasingviz-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── n8n (Workflow Automation) ──────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: aliasingviz-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
  backend_data:
